body:
  text: 百論序釋僧肇作百論者蓋是通聖心之津塗開真諦之要論也佛泥曰後八百餘年有出家大士厥名提婆玄心獨悟俊氣高朗道映當時神超世表故能闢三藏之重關坦十二之幽路擅步迦夷為法城塹于時外道紛然異端競起邪辯逼真殆亂正道乃仰慨聖教之陵遲俯悼群迷之縱惑將遠拯沈淪故作斯論所以防正閑邪大明於宗極者矣是以正化以之而隆邪道以之而替非夫領括眾妙孰能若斯論有百偈故以百為名理致淵玄統群籍之要文旨婉約窮制作之美然至趣幽簡尠得其門有婆藪開士者明慧內融妙思奇拔遠契玄蹤為之訓釋使沈隱之義彰於徽翰風味宣流被於來葉文藻煥然宗塗易曉其為論也言而無當破而無執儻然靡據而事不失真蕭焉無寄而理自玄會返本之道著乎茲矣有天竺沙門鳩摩羅什器量淵弘俊神超邈鑽仰累年轉不可測常味詠斯論以為心要先雖親譯而方言未融至令思尋者躊躇於謬文摽位者乖迕於歸致大秦司隷校尉安成侯姚嵩風韻清舒沖心簡勝博涉內外理思兼通少好大道長而彌篤雖復形羈時務而法言不輟每撫茲文所慨良多以弘始六年歲次壽星集理味沙門與什考挍正本陶練覆疏務存論旨使質而不野簡而必詣宗致盡爾無間然矣論凡二十品品各五偈後十品其人以為無益此土故闕而不傳冀明識君子詳而攬焉
